<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BSI 我的</title>
  <style>
    :root { --ink:#242d35; --muted:#68747d; --canvas:#f4f6f3; --panel:#fff; --line:#d9dfd9; --nav:#26343e; --blue:#2164a7; --blue-soft:#eaf3fc; --green:#16845b; --green-soft:#e9f7f0; --amber:#b87918; --amber-soft:#fff5df; --red:#b7413e; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    * { box-sizing:border-box; } html,body { height:100%; } body { margin:0; overflow:hidden; color:var(--ink); background:var(--canvas); } button,input,select,textarea { font:inherit; } button { cursor:pointer; }
    .page { height:100%; display:grid; grid-template-rows:auto auto minmax(0,1fr); gap:14px; padding:20px 28px 22px; }
    .head { display:flex; align-items:start; justify-content:space-between; gap:18px; } h1 { margin:0; font-size:28px; line-height:1.2; } .sub { margin:6px 0 0; color:var(--muted); font-size:14px; } .sync { display:flex; align-items:center; gap:9px; color:var(--muted); font-size:13px; padding-top:4px; } .status { display:inline-flex; align-items:center; gap:5px; padding:5px 8px; border:1px solid #badfce; border-radius:999px; background:var(--green-soft); color:var(--green); font-size:12px; font-weight:750; } .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
    .overview { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)) 1.55fr; gap:12px; min-height:156px; } .metric,.chart { border:1px solid var(--line); border-radius:8px; background:var(--panel); } .metric { padding:17px; display:flex; flex-direction:column; } .metric-label { color:var(--muted); font-size:13px; font-weight:700; } .value { margin-top:13px; font-size:26px; line-height:1; font-weight:800; letter-spacing:0; } .value.positive { color:var(--green); } .metric-foot { margin-top:auto; padding-top:14px; border-top:1px dashed var(--line); color:var(--muted); font-size:12px; } .chart { min-width:0; padding:13px 15px 10px; display:grid; grid-template-rows:auto minmax(0,1fr); } .chart-head { display:flex; justify-content:space-between; align-items:center; gap:10px; } .chart h2 { margin:0; font-size:14px; } .ranges { display:flex; gap:3px; } .ranges button { border:0; background:transparent; color:var(--muted); border-radius:4px; padding:4px 6px; font-size:11px; } .ranges button.active { background:var(--blue-soft); color:var(--blue); font-weight:750; } canvas { display:block; width:100%; height:100%; min-height:84px; }
    .workspace { min-height:0; display:grid; grid-template-columns:235px minmax(0,1fr); gap:12px; } .tools,.detail { min-height:0; border:1px solid var(--line); border-radius:8px; background:var(--panel); overflow:hidden; } .tools { padding:12px; } .tools h2 { margin:3px 5px 10px; font-size:15px; } .tool { width:100%; min-height:59px; margin:7px 0; padding:10px 11px; text-align:left; border:1px solid transparent; border-radius:6px; background:transparent; color:var(--ink); } .tool:hover { background:#f4f7f5; } .tool.active { border-color:#b8d3ea; background:var(--blue-soft); color:#195990; } .tool b { display:block; font-size:13px; } .tool small { display:block; margin-top:3px; color:var(--muted); font-size:11px; font-weight:500; } .tool.active small { color:#4a7190; }
    .detail { display:grid; grid-template-rows:auto minmax(0,1fr); } .detail-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 16px; border-bottom:1px solid var(--line); } .detail-head h2 { margin:0; font-size:17px; } .detail-body { min-height:0; overflow:auto; padding:16px; } .outline { border:1px solid #ccd6d1; border-radius:6px; background:#fff; color:var(--ink); padding:8px 10px; font-size:13px; font-weight:700; } .primary { border:1px solid var(--nav); border-radius:6px; background:var(--nav); color:#fff; padding:8px 11px; font-size:13px; font-weight:750; } .muted { color:var(--muted); font-size:13px; line-height:1.6; }
    .data-table { width:100%; border-collapse:collapse; font-size:12px; } .data-table th,.data-table td { padding:10px 9px; text-align:left; border-bottom:1px solid #edf0ed; white-space:nowrap; } .data-table th { color:var(--muted); font-weight:700; background:#fbfcfa; position:sticky; top:0; } .flow-in { color:var(--red); font-weight:700; } .flow-out { color:var(--green); font-weight:700; } .stack { display:grid; gap:12px; } .split { display:grid; grid-template-columns:1fr 1fr; gap:12px; } .info { padding:13px; border:1px solid var(--line); border-radius:6px; background:#fbfcfa; } .info h3 { margin:0 0 7px; font-size:14px; } .info p { margin:0; color:var(--muted); font-size:13px; line-height:1.55; } .report { min-height:240px; padding:17px; border:1px solid var(--line); border-radius:6px; background:#fbfcfa; } .report h3 { margin:0 0 8px; font-size:16px; } .report p { color:var(--muted); line-height:1.6; font-size:13px; } .tabs { display:flex; gap:5px; } .tabs button { padding:7px 10px; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--muted); font-size:12px; } .tabs button.active { border-color:#a9cae8; background:var(--blue-soft); color:var(--blue); font-weight:750; }
    .setting-row { display:grid; grid-template-columns:180px minmax(0,1fr) auto; align-items:center; gap:15px; padding:14px 0; border-bottom:1px solid #edf0ed; } .setting-row:last-child { border:0; } .setting-name { font-size:13px; font-weight:750; } .setting-value { color:var(--muted); font-size:13px; } .pencil { width:30px; height:30px; border:1px solid #ccd6d1; border-radius:6px; background:#fff; color:var(--muted); font-size:17px; line-height:1; } .editor { padding:15px; border:1px solid #a9cae8; border-radius:6px; background:var(--blue-soft); } .editor label { display:block; margin:0 0 6px; color:#3a6283; font-size:12px; font-weight:750; } .editor input,.editor select { width:100%; height:36px; padding:7px 9px; border:1px solid #bfd0dd; border-radius:5px; background:#fff; color:var(--ink); } .editor-grid { display:grid; grid-template-columns:1.4fr .8fr .8fr; gap:10px; } .editor-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; } .verify { display:flex; gap:8px; margin-top:10px; } .verify input { width:130px; } .hint { margin:8px 0 0; color:#547087; font-size:12px; }
    .connection { display:grid; grid-template-columns:1fr 1fr; gap:12px; } .connection-card { padding:15px; border:1px solid var(--line); border-radius:6px; background:#fbfcfa; } .connection-card h3 { margin:0 0 7px; font-size:15px; } .connection-card p { min-height:42px; margin:0; color:var(--muted); font-size:13px; line-height:1.55; } .connection-card .row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:12px; } .tag { display:inline-flex; align-items:center; padding:4px 7px; border:1px solid #d7deda; border-radius:999px; background:#fff; color:var(--muted); font-size:11px; font-weight:700; } .tag.on { border-color:#badfce; background:var(--green-soft); color:var(--green); } .notice { margin-top:14px; padding:11px 12px; border-left:3px solid var(--amber); background:var(--amber-soft); color:#75521c; font-size:13px; line-height:1.55; }
    .modal { position:fixed; inset:0; display:none; place-items:center; padding:20px; background:rgba(31,42,49,.42); z-index:5; } .modal.show { display:grid; } .modal-card { width:min(500px,100%); padding:20px; border:1px solid #c8d1cc; border-radius:8px; background:#fff; box-shadow:0 18px 45px rgba(30,42,35,.22); } .modal-card h2 { margin:0 0 16px; font-size:20px; } .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; } .field label { display:block; margin-bottom:5px; color:var(--muted); font-size:12px; font-weight:700; } .field input,.field select { width:100%; height:38px; padding:8px 9px; border:1px solid #ccd6d1; border-radius:5px; background:#fff; } .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
    .toast { position:fixed; right:22px; bottom:20px; display:none; padding:10px 13px; border:1px solid #badfce; border-radius:6px; background:#fff; color:var(--green); box-shadow:0 8px 22px rgba(30,42,35,.12); font-size:13px; font-weight:700; } .toast.show { display:block; }
    @media (max-width:1040px) { .overview{grid-template-columns:repeat(3,1fr)}.chart{grid-column:span 3}.workspace{grid-template-columns:190px minmax(0,1fr)} } @media (max-width:720px) { body{overflow:auto}.page{height:auto;padding:16px}.overview,.workspace,.split,.connection{grid-template-columns:1fr}.chart{grid-column:auto}.workspace{min-height:650px}.setting-row{grid-template-columns:1fr auto}.setting-value{grid-column:1}.editor-grid,.form-grid{grid-template-columns:1fr}.head{display:block}.sync{margin-top:12px} }
  </style>
</head>
<body>
  <main class="page">
    <header class="head"><div><h1>我的</h1><p class="sub">查看账户回报与管理数据接入。</p></div><div class="sync"><span class="status"><i class="dot"></i>每日同步完成</span><span>数据截至 7/11/2026 08:10</span></div></header>
    <section class="overview" aria-label="账户概览">
      <article class="metric"><span class="metric-label">总净清算价值</span><strong class="value">$91,182</strong><span class="metric-foot">估值日期 7/11/2026</span></article>
      <article class="metric"><span class="metric-label">累计出入金</span><strong class="value">$76,865</strong><span class="metric-foot">最近变动 7/7/2026</span></article>
      <article class="metric"><span class="metric-label">资金加权年化收益率（XIRR）</span><strong class="value positive">15.16%</strong><span class="metric-foot">成立以来 · 截至 7/11/2026</span></article>
      <section class="chart"><div class="chart-head"><h2>XIRR 趋势</h2><div class="ranges"><button data-range="1M">1个月</button><button data-range="3M">3个月</button><button data-range="YTD">年初至今</button><button class="active" data-range="ALL">全部</button></div></div><canvas id="xirrChart" aria-label="XIRR 趋势图"></canvas></section>
    </section>
    <section class="workspace">
      <aside class="tools"><h2>账户工具</h2><button class="tool active" data-tool="cash"><b>持仓及出入金明细</b><small>现金流、估值与 XIRR 来源</small></button><button class="tool" data-tool="report"><b>投资分析报告</b><small>策略表现与情绪纪律</small></button><button class="tool" data-tool="settings"><b>策略提醒设置</b><small>邮箱、频率与非交易时间</small></button><button class="tool" data-tool="connection"><b>IBKR 数据接入</b><small>历史同步与盘中连接</small></button></aside>
      <section class="detail"><header class="detail-head"><h2 id="detailTitle">持仓及出入金明细</h2><div id="detailAction"><button class="primary" id="addCash">新增现金流</button></div></header><div class="detail-body" id="detailBody"></div></section>
    </section>
  </main>
  <div class="modal" id="cashModal" role="dialog" aria-modal="true"><section class="modal-card"><h2>新增现金流</h2><div class="form-grid"><div class="field"><label>发生日期</label><input id="cashDate" type="date" value="2026-07-11"></div><div class="field"><label>类型</label><select id="cashType"><option value="入金">入金</option><option value="出金">出金</option></select></div><div class="field"><label>原币金额</label><input id="cashAmount" type="number" placeholder="0.00"></div><div class="field"><label>币种</label><select id="cashCurrency"><option>USD</option><option>HKD</option><option>CNY</option></select></div><div class="field"><label>确认后的 USD 金额</label><input id="cashUsd" type="number" placeholder="0.00"></div></div><div class="modal-actions"><button class="outline" data-close-modal>取消</button><button class="primary" id="saveCash">保存</button></div></section></div>
  <div class="toast" id="toast"></div>
  <script>
    const cashRows = [
      ['2026-07-11','期末总市值清算（虚拟流入）','+$91,182','计算值'], ['2026-07-07','净出金','+$7,359','IBKR'], ['2026-05-27','追加入金','-$1,472','IBKR'], ['2026-05-15','追加入金','-$1,472','IBKR'], ['2026-04-27','净出金','+$447','IBKR']
    ];
    const body = document.getElementById('detailBody'), title = document.getElementById('detailTitle'), action = document.getElementById('detailAction');
    const toast = document.getElementById('toast'); let editingSettings = false, gatewayOn = false, verified = false, period = '月度';
    function notify(text){ toast.textContent=text; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2200); }
    function renderCash(){ title.textContent='持仓及出入金明细'; action.innerHTML='<button class="primary" id="addCash">新增现金流</button>'; body.innerHTML='<table class="data-table"><thead><tr><th>日期</th><th>变动说明</th><th>净现金流（USD）</th><th>来源</th></tr></thead><tbody>'+cashRows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td class="${r[2].startsWith('+')?'flow-out':'flow-in'}">${r[2]}</td><td>${r[3]}</td></tr>`).join('')+'</tbody></table><p class="muted" style="margin:14px 0 0">期末总市值清算仅用于 XIRR 计算，不属于真实出金。</p>'; document.getElementById('addCash').onclick=()=>document.getElementById('cashModal').classList.add('show'); }
    function renderReport(){ title.textContent='投资分析报告'; action.innerHTML='<button class="primary" id="generateReport">生成报告</button>'; body.innerHTML=`<div class="stack"><div class="tabs"><button class="period ${period==='月度'?'active':''}" data-period="月度">月度</button><button class="period ${period==='季度'?'active':''}" data-period="季度">季度</button><button class="period ${period==='年度'?'active':''}" data-period="年度">年度</button></div><section class="report" id="reportOutput"><h3>尚未生成报告</h3><p>选择时间维度后生成，报告将基于已同步的交易、计划、提醒与复盘记录。</p></section></div>`; document.querySelectorAll('.period').forEach(b=>b.onclick=()=>{period=b.dataset.period;renderReport()}); document.getElementById('generateReport').onclick=()=>{document.getElementById('reportOutput').innerHTML=`<h3>${period}投资分析报告</h3><div class="split"><div class="info"><h3>策略表现</h3><p>本期已结束策略 3 项；计划与实际操作的比对结果已汇入交易复盘。</p></div><div class="info"><h3>情绪纪律</h3><p>基于已确认的关闭原因、提醒处理与策略版本变化生成观察，不改写用户规则。</p></div></div>`;notify('报告已生成');}; }
    function settingRead(){ return '<div class="setting-row"><div class="setting-name">邮件提醒</div><div class="setting-value">'+(verified?'chloe@example.com 已验证':'尚未添加邮箱')+'</div><button class="pencil" id="editSettings" aria-label="编辑提醒设置">✎</button></div><div class="setting-row"><div class="setting-name">提醒频率</div><div class="setting-value">1 小时内不超过 3 次</div></div><div class="setting-row"><div class="setting-name">非交易时间发送提醒</div><div class="setting-value">关闭</div></div>'; }
    function settingEdit(){ return '<div class="editor"><div class="editor-grid"><div><label>邮箱</label><input id="email" type="email" value="'+(verified?'chloe@example.com':'')+'" placeholder="name@example.com"></div><div><label>静默时长</label><select id="quietHours"><option>1 小时</option><option>2 小时</option><option>4 小时</option></select></div><div><label>最多触发</label><select id="maxCount"><option>3 次</option><option>5 次</option></select></div></div><div class="verify"><button class="outline" id="sendCode">发送验证</button><input id="verifyCode" inputmode="numeric" placeholder="验证码" disabled><button class="outline" id="verifyEmail" disabled>验证邮箱</button></div><p class="hint" id="verifyHint">邮箱验证通过后，才会保存邮箱和提醒设置。</p><div class="editor-actions"><button class="outline" id="cancelSettings">取消</button><button class="primary" id="saveSettings" disabled>保存</button></div></div>'; }
    function wireSettings(){ document.getElementById('editSettings').onclick=()=>{editingSettings=true;renderSettings()}; }
    function renderSettings(){ title.textContent='策略提醒设置'; action.innerHTML=''; body.innerHTML=editingSettings?settingEdit():settingRead(); if(!editingSettings){wireSettings();return;} document.getElementById('cancelSettings').onclick=()=>{editingSettings=false;renderSettings()}; document.getElementById('sendCode').onclick=()=>{document.getElementById('verifyCode').disabled=false;document.getElementById('verifyEmail').disabled=false;document.getElementById('verifyHint').textContent='验证邮件已发送。输入验证码后完成验证。';}; document.getElementById('verifyEmail').onclick=()=>{if(document.getElementById('verifyCode').value==='123456'){verified=true;document.getElementById('saveSettings').disabled=false;document.getElementById('verifyHint').textContent='邮箱验证通过。请点击保存使设置生效。';}else document.getElementById('verifyHint').textContent='验证码不正确。原设置尚未变更。';}; document.getElementById('saveSettings').onclick=()=>{editingSettings=false;renderSettings();notify('提醒设置已保存');}; }
    function renderConnection(){ title.textContent='IBKR 数据接入'; action.innerHTML=''; body.innerHTML=`<div class="connection"><section class="connection-card"><h3>历史同步</h3><p>通过 Flex 获取出入金、成交、日终持仓与对账记录。</p><div class="row"><span class="tag on">每日同步完成</span><button class="outline" id="testFlex">检查连接</button></div></section><section class="connection-card"><h3>盘中连接</h3><p>启动本机 IB Gateway / TWS 后，读取当前持仓、延迟行情和期权波动率数据。</p><div class="row"><span class="tag ${gatewayOn?'on':''}" id="gatewayState">${gatewayOn?'已连接':'未运行'}</span><button class="outline" id="toggleGateway">${gatewayOn?'断开连接':'连接盘中数据'}</button></div></section></div><div class="notice">盘中连接未运行时，BSI 仍会保留每日历史同步；已启用的盘中提醒暂停，并以最后数据时间为准。</div>`; document.getElementById('testFlex').onclick=()=>notify('Flex 连接正常'); document.getElementById('toggleGateway').onclick=()=>{gatewayOn=!gatewayOn; window.parent.postMessage({type:'bsi-data-connection',connected:gatewayOn},'*');renderConnection();notify(gatewayOn?'盘中数据已连接':'盘中连接已断开');}; }
    function selectTool(tool){ document.querySelectorAll('.tool').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool)); if(tool==='cash')renderCash(); if(tool==='report')renderReport(); if(tool==='settings')renderSettings(); if(tool==='connection')renderConnection(); }
    document.querySelectorAll('.tool').forEach(b=>b.onclick=()=>selectTool(b.dataset.tool)); document.querySelectorAll('[data-close-modal]').forEach(b=>b.onclick=()=>document.getElementById('cashModal').classList.remove('show'));
    document.getElementById('saveCash').onclick=()=>{const amount=document.getElementById('cashUsd').value, type=document.getElementById('cashType').value, date=document.getElementById('cashDate').value;if(!amount){notify('请填写确认后的 USD 金额');return;} cashRows.unshift([date,type,(type==='入金'?'-':'+')+'$'+Number(amount).toLocaleString(),'用户补录']);document.getElementById('cashModal').classList.remove('show');renderCash();notify('现金流已保存，XIRR 已更新');};
    function drawChart(){const c=document.getElementById('xirrChart'),r=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;c.width=r.width*dpr;c.height=r.height*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);const w=r.width,h=r.height;const vals=[2,5,4,8,10,9,12,11,13,15.16];x.clearRect(0,0,w,h);x.strokeStyle='#e5eae6';x.lineWidth=1;for(let i=1;i<4;i++){let y=(h/4)*i;x.beginPath();x.moveTo(0,y);x.lineTo(w,y);x.stroke();}x.strokeStyle='#2164a7';x.lineWidth=2;x.beginPath();vals.forEach((v,i)=>{const px=10+i*(w-20)/(vals.length-1),py=h-11-(v/18)*(h-23);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();const last=vals.length-1,px=10+last*(w-20)/(vals.length-1),py=h-11-(vals[last]/18)*(h-23);x.fillStyle='#2164a7';x.beginPath();x.arc(px,py,3.5,0,Math.PI*2);x.fill();x.fillStyle='#2164a7';x.font='11px -apple-system';x.fillText('15.16%',Math.max(5,px-35),Math.max(12,py-9));}
    document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-range]').forEach(x=>x.classList.remove('active'));b.classList.add('active');drawChart();}); window.addEventListener('resize',drawChart); renderCash(); requestAnimationFrame(drawChart);
  </script>
</body>
</html>
